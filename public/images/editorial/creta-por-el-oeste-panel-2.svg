<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">RouteWonder: Creta por el oeste: playas, gargantas y pueblos sin cambiar cada noche</title>
  <desc id="desc">Ilustración editorial 2 para Creta por el oeste: playas, gargantas y pueblos sin cambiar cada noche, con motivo island.</desc>
  
  <defs>
    <pattern id="grid" width="56" height="68" patternUnits="userSpaceOnUse">
      <path d="M0 .5H80M.5 0V80" stroke="#1d4b4d" stroke-opacity=".08" fill="none"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
    </filter>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f1df"/>
      <stop offset=".58" stop-color="#efe2c3" stop-opacity=".18"/>
      <stop offset="1" stop-color="#d69a4d" stop-opacity=".55"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#wash)"/>
  <rect width="1400" height="900" fill="url(#grid)"/>
  <rect width="1400" height="900" filter="url(#noise)" opacity=".58"/>
  
